<li class="archive-post">    
    <h4><a href="{{ post.url }}">{{ post.title }}</a></h4>
    <p class="meta">
        by <a href="{{ post.author-link }}" target="_blank" rel="noreferrer noopener" title="author">{{ post.author }}</a>
        on <a href="{{ post.date | date: '/%Y/%m/' | prepend: site.baseurl }}">
            <time datetime="{{ post.date | date: '%Y-%m-%d' }}">{{ post.date | date: "%b %-d,%Y" }}</time>
        </a>
    </p>
    <p class="taglist">
        {% for tag in post.tags %}
        <a href="{{ tag | downcase | slugify | prepend: '/tags/' | prepend: site.baseurl }}">{{ tag }}</a>
        {% endfor %}
    </p>
</li>
