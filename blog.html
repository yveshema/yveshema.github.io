---
title: Blog
layout: default
permalink: /:basename
---
<ul>
    {% for post in site.posts %}
    <li>
        <div class="card post-card">
            <h2>
                <a href="{{ post.url }}">{{ post.title }}</a>
            </h2>
            <p>{{ post.excerpt | markdownify }}</p>
        </div>
    </li>
    {% endfor %}
</ul>
